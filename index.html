<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE LAST ARCHIVE — 上课模拟器</title>
  <meta name="description" content="文明会熄灭。知识不会。">
  <meta property="og:title" content="THE LAST ARCHIVE — 上课模拟器">
  <meta property="og:description" content="文明会熄灭。知识不会。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="THE LAST ARCHIVE">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="THE LAST ARCHIVE — 上课模拟器">
  <meta name="twitter:description" content="文明会熄灭。知识不会。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Three.js Background Canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- ==================== SCENE 1: ENTRY ==================== -->
  <div id="scene-entry" class="scene active">
    <div class="entry-vignette"></div>
    <div class="entry-content">
      <div class="title-container">
        <div class="title-rune top-left"></div>
        <div class="title-rune top-right"></div>
        <h1 class="title-main">
          <span class="title-line">THE LAST</span>
          <span class="title-line title-emphasis">ARCHIVE</span>
        </h1>
        <div class="title-rune bottom-left"></div>
        <div class="title-rune bottom-right"></div>
      </div>
      <p class="subtitle">文明会熄灭。知识不会。</p>
      <div class="entry-actions">
        <button id="btn-accept-legacy" class="btn-legacy">
          <span class="btn-legacy-border"></span>
          <span class="btn-legacy-text">接受文明传承</span>
          <span class="btn-legacy-glow"></span>
        </button>
      </div>
      <p class="entry-hint">文明档案节点 // 轨道站 7 号</p>
    </div>
  </div>

  <!-- ==================== SCENE 2: CONSCIOUSNESS SYNC ==================== -->
  <div id="scene-sync" class="scene">
    <div class="sync-overlay"></div>
    <div class="sync-content">
      <div class="sync-header">
        <div class="sync-icon"></div>
        <p class="sync-title">意识同步中</p>
      </div>
      <div class="progress-container">
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
          <div class="progress-scan"></div>
        </div>
        <p id="progress-text" class="progress-text">0%</p>
      </div>
      <div class="sync-status">
        <p id="sync-status-text" class="sync-status-text">正在初始化神经链接...</p>
      </div>
      <div id="sync-complete" class="sync-complete hidden">
        <p class="complete-main">同步完成</p>
        <p class="complete-sub">观测者兼容</p>
      </div>
    </div>
  </div>

  <!-- ==================== SCENE 3: ARCHIVE INTERFACE ==================== -->
  <div id="scene-archive" class="scene">
    <header class="archive-header">
      <div class="archive-header-line"></div>
      <div class="archive-header-content">
        <h2 class="archive-title">THE LAST ARCHIVE</h2>
        <p class="archive-subtitle">文明遗物档案 // Alpha-7 扇区</p>
      </div>
      <div class="archive-header-line"></div>
    </header>
    <div class="archive-filters">
      <button class="filter-btn active" data-filter="all">全部档案</button>
      <button class="filter-btn" data-filter="mathematics">因果律系</button>
      <button class="filter-btn" data-filter="computation">创世协议</button>
      <button class="filter-btn" data-filter="engineering">物质法则</button>
      <button class="filter-btn" data-filter="language">跨文明同步</button>
    </div>
    <div id="cards-grid" class="cards-grid">
      <!-- Generated by JS -->
    </div>
    <div class="archive-footer">
      <div id="broadcast-panel" class="broadcast-panel">
        <span class="broadcast-label">◆ 文明广播</span>
        <span id="broadcast-text" class="broadcast-text"></span>
      </div>
      <p>档案节点 07 // <span id="observer-count">1</span> 位活跃观测者</p>
    </div>
  </div>

  <!-- ==================== TRANSITION OVERLAY ==================== -->
  <div id="transition-overlay" class="transition-overlay">
    <div class="transition-flash"></div>
    <div class="transition-vortex"></div>
    <div class="transition-cracks"></div>
    <div id="transition-ring" class="transition-ring"></div>
    <div class="transition-particles"></div>
    <div id="transition-reveal-text" class="transition-reveal-text"></div>
  </div>

  <!-- Portals for artifact activation -->
  <div id="portal-container" class="portal-container">
    <div class="portal-ring-outer"></div>
    <div class="portal-ring-inner"></div>
    <div class="portal-energy"></div>
  </div>

  <!-- ==================== KNOWLEDGE PROJECTION PLAYER ==================== -->
  <div id="projection-overlay" class="projection-overlay">
    <div class="projection-bg"></div>
    <div class="projection-frame">
      <div class="projection-header">
        <div class="projection-header-left">
          <span class="projection-label">知识载体连接中……</span>
          <span class="projection-code" id="projection-code">CN-000</span>
        </div>
        <div class="projection-header-center">
          <span class="projection-artifact-name" id="projection-name">遗物名</span>
        </div>
        <button id="btn-close-projection" class="btn-close-projection">
          <span class="btn-close-icon">✕</span>
          <span class="btn-close-text">关闭投影</span>
        </button>
      </div>
      <div class="projection-player-wrapper">
        <iframe
          id="projection-iframe"
          class="projection-iframe"
          src=""
          allow="autoplay; encrypted-media; fullscreen"
          allowfullscreen
          referrerpolicy="origin"
          sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-presentation"
        ></iframe>
      </div>
      <div class="projection-footer">
        <div class="projection-scanline"></div>
        <div class="projection-footer-links">
          <p class="projection-hint">按 <kbd>F</kbd> 进入全屏沉浸模式 · 按 <kbd>Esc</kbd> 退出</p>
          <a id="btn-fallback-bilibili" class="btn-fallback" href="#" target="_blank">在 B 站打开</a>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== SCRIPTS ==================== -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
